<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Coffee machine program flow</title>
<desc>Flowchart showing the logic of a command-line coffee machine: menu display, drink selection, resource check, payment, and drink serving.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .ts { font-size: 12px; fill: #534AB7; }
    .start-end rect { fill: #D3D1C7; stroke: #5F5E5A; }
    .start-end text { fill: #2C2C2A; }
    .step-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .step-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .step-amber .th { fill: #633806; }
    .step-amber .ts { fill: #854F0B; }
    .step-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .step-teal .th { fill: #085041; }
    .step-teal .ts { fill: #0F6E56; }
    .step-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .step-green .th { fill: #27500A; }
    .step-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .step-red .th { fill: #791F1F; }
    .step-red .ts { fill: #A32D2D; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- START -->
<g class="start-end">
  <rect x="240" y="30" width="200" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Start</text>
</g>

<line x1="340" y1="74" x2="340" y2="104" class="arr" marker-end="url(#arrow)"/>

<!-- Show menu -->
<g class="step-purple">
  <rect x="200" y="104" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="124" text-anchor="middle" dominant-baseline="central">Display menu</text>
  <text class="ts" x="340" y="144" text-anchor="middle" dominant-baseline="central">show_menu() → drink_options dict</text>
</g>

<line x1="340" y1="160" x2="340" y2="190" class="arr" marker-end="url(#arrow)"/>

<!-- Get drink -->
<g class="step-purple">
  <rect x="200" y="190" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">User picks drink</text>
  <text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">get_drink_name() with validation</text>
</g>

<line x1="340" y1="246" x2="340" y2="276" class="arr" marker-end="url(#arrow)"/>

<!-- Resource check -->
<g class="step-amber">
  <rect x="190" y="276" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central">Enough ingredients?</text>
  <text class="ts" x="340" y="316" text-anchor="middle" dominant-baseline="central">Check water, milk, coffee</text>
</g>

<!-- No → left -->
<line x1="190" y1="304" x2="100" y2="304" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.7"/>
<text font-size="12" fill="#5F5E5A" x="143" y="296" text-anchor="middle">No</text>
<g class="step-red">
  <rect x="20" y="276" width="80" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="60" y="296" text-anchor="middle" dominant-baseline="central">Print</text>
  <text class="ts" x="60" y="314" text-anchor="middle" dominant-baseline="central">shortage msg</text>
</g>
<line x1="60" y1="332" x2="60" y2="780" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.4"/>
<line x1="60" y1="780" x2="282" y2="780" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.4"/>

<!-- Yes → down -->
<line x1="340" y1="332" x2="340" y2="362" class="arr" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="355" y="350">Yes</text>

<!-- Take money -->
<g class="step-purple">
  <rect x="200" y="362" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="382" text-anchor="middle" dominant-baseline="central">Accept coins</text>
  <text class="ts" x="340" y="402" text-anchor="middle" dominant-baseline="central">take_money() → quarters, dimes…</text>
</g>

<line x1="340" y1="418" x2="340" y2="448" class="arr" marker-end="url(#arrow)"/>

<!-- Sufficient funds? -->
<g class="step-amber">
  <rect x="190" y="448" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="468" text-anchor="middle" dominant-baseline="central">Enough money?</text>
  <text class="ts" x="340" y="488" text-anchor="middle" dominant-baseline="central">insufficient_funds() check</text>
</g>

<!-- No → right -->
<line x1="490" y1="476" x2="570" y2="476" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.7"/>
<text font-size="12" fill="#5F5E5A" x="532" y="468" text-anchor="middle">No</text>
<g class="step-red">
  <rect x="570" y="448" width="80" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="610" y="468" text-anchor="middle" dominant-baseline="central">Refund</text>
  <text class="ts" x="610" y="486" text-anchor="middle" dominant-baseline="central">+ return</text>
</g>
<line x1="610" y1="504" x2="610" y2="780" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.4"/>
<line x1="610" y1="780" x2="420" y2="780" class="arr" marker-end="url(#arrow)" stroke="#888780" opacity="0.4"/>

<!-- Yes → down -->
<line x1="340" y1="504" x2="340" y2="534" class="arr" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="355" y="522">Yes</text>

<!-- Deduct resources -->
<g class="step-teal">
  <rect x="200" y="534" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="554" text-anchor="middle" dominant-baseline="central">Deduct ingredients</text>
  <text class="ts" x="340" y="574" text-anchor="middle" dominant-baseline="central">resources[r] -= drink_ingredients[r]</text>
</g>

<line x1="340" y1="590" x2="340" y2="620" class="arr" marker-end="url(#arrow)"/>

<!-- Profit + change -->
<g class="step-teal">
  <rect x="200" y="620" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="640" text-anchor="middle" dominant-baseline="central">Update profit + give change</text>
  <text class="ts" x="340" y="660" text-anchor="middle" dominant-baseline="central">profit += cost · change = paid − cost</text>
</g>

<line x1="340" y1="676" x2="340" y2="706" class="arr" marker-end="url(#arrow)"/>

<!-- Serve drink -->
<g class="step-green">
  <rect x="200" y="706" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="728" text-anchor="middle" dominant-baseline="central" fill="#27500A">Serve drink ☕</text>
</g>

<line x1="340" y1="750" x2="340" y2="770" class="arr" marker-end="url(#arrow)"/>

<!-- END -->
<g class="start-end">
  <rect x="240" y="770" width="200" height="34" rx="17" stroke-width="0.5"/>
  <text class="th" x="340" y="787" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">End</text>
</g>

</svg>
